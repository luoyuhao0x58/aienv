[supervisord]
nodaemon=true
logfile=/.openclaw/supervisor/logs/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/.openclaw/supervisor/run/supervisord.pid

[unix_http_server]
file=/.openclaw/supervisor/run/supervisor.sock

[supervisorctl]
serverurl=unix:///.openclaw/supervisor/run/supervisor.sock


[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface


[program:openclaw]
command=/usr/bin/openclaw gateway --allow-unconfigured --verbose run
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile_backups=0
stderr_logfile_backups=0
autorestart=true
startsecs=5


[program:chromium]
command=/usr/bin/chromium --headless --no-sandbox -disable-gpu --disable-gpu --disable-dev-shm-usage --disable-software-rasterizer --disable-setuid-sandbox --window-size=1920,1080 --no-first-run --disable-session-crashed-bubble --remote-debugging-address=0.0.0.0 --remote-debugging-port=18800
stdout_logfile=/.openclaw/supervisor/logs/chromium_stdout.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile=/.openclaw/supervisor/logs/chromium_stderr.log
stderr_logfile_maxbytes=50MB
stderr_logfile_backups=5
autorestart=true
startsecs=5